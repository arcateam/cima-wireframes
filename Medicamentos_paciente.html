<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Agregar Medicamento</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0ea5e9", // sky-500
                        "background-light": "#f3f4f6", // gray-100
                        "background-dark": "#111827", // gray-900
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem", // md
                    },
                },
            },
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div
            class="w-full max-w-5xl mx-auto bg-white dark:bg-gray-800 rounded-lg shadow-2xl text-gray-800 dark:text-gray-200">
            <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-2xl font-bold">Agregar Medicamento</h2>
                <button class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-100">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="medicamento">Medicamento <span class="text-red-500">*</span></label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="medicamento" placeholder="buscar..." type="text" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="presentacion">Presentación</label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="presentacion" type="text" />
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="dosis">Dosis</label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="dosis" type="text" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="unidad">Unidad</label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="unidad" type="text" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="via">Vía</label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="via" type="text" />
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="indicacion">Indicación <span class="text-red-500">*</span></label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                    id="indicacion" type="text" />
                            </div>
                            <div class="relative">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="fecha_inicio">Fecha de inicio <span class="text-red-500">*</span></label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary pr-10"
                                    id="fecha_inicio" type="date" />
                                <span
                                    class="material-symbols-outlined absolute right-3 top-9 text-gray-400 dark:text-gray-500 pointer-events-none">calendar_today</span>
                            </div>
                            <div class="relative">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="fecha_fin">Fecha de fin</label>
                                <input
                                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary pr-10"
                                    id="fecha_fin" type="date" />
                                <span
                                    class="material-symbols-outlined absolute right-3 top-9 text-gray-400 dark:text-gray-500 pointer-events-none">calendar_today</span>
                            </div>
                        </div>
                        <div class="space-y-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Régimen de administración
                            </h3>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center">
                                    <input checked="" class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                                        id="tipo_regimen_intervalo" name="tipo_regimen" type="radio"
                                        value="intervalo" />
                                    <label class="ml-2 block text-sm font-medium text-gray-900 dark:text-gray-300"
                                        for="tipo_regimen_intervalo">Por intervalo</label>
                                </div>
                                <div class="flex items-center">
                                    <input class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                                        id="tipo_regimen_dias" name="tipo_regimen" type="radio" value="dias" />
                                    <label class="ml-2 block text-sm font-medium text-gray-900 dark:text-gray-300"
                                        for="tipo_regimen_dias">Por días específicos</label>
                                </div>
                            </div>
                            <div id="regimen_intervalo">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="frecuencia_num">Frecuencia de administración</label>
                                <div
                                    class="flex items-center gap-2 border border-gray-300 dark:border-gray-600 rounded-DEFAULT bg-gray-50 dark:bg-gray-700 px-3 focus-within:ring-2 focus-within:ring-primary focus-within:border-primary">
                                    <span class="text-gray-500 dark:text-gray-400">Cada</span>
                                    <input class="w-16 p-2 bg-transparent border-0 focus:ring-0 text-center"
                                        id="frecuencia_num" placeholder="2" type="number" />
                                    <select
                                        class="bg-transparent border-0 focus:ring-0 text-gray-800 dark:text-gray-200"
                                        id="frecuencia_unidad">
                                        <option>días</option>
                                        <option selected="">semanas</option>
                                        <option>meses</option>
                                    </select>
                                </div>
                            </div>
                            <div class="hidden space-y-2" id="regimen_dias_especificos">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                    for="dias-administracion-wrapper">Seleccione uno o varios días de la semana</label>
                                <div id="dias-administracion-wrapper">
                                    <div class="flex flex-wrap gap-2">
                                        <div><input class="sr-only peer" id="lu" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="lu">Lu</label></div>
                                        <div><input class="sr-only peer" id="ma" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="ma">Ma</label></div>
                                        <div><input class="sr-only peer" id="mi" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="mi">Mi</label></div>
                                        <div><input class="sr-only peer" id="ju" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="ju">Ju</label></div>
                                        <div><input class="sr-only peer" id="vi" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="vi">Vi</label></div>
                                        <div><input class="sr-only peer" id="sa" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="sa">Sá</label></div>
                                        <div><input class="sr-only peer" id="do" type="checkbox" /><label
                                                class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded-DEFAULT cursor-pointer transition-colors text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                                for="do">Do</label></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Dosis</h3>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center">
                                    <input checked class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                                        id="dosis_simple_radio" name="tipo_dosis" type="radio" value="simple" />
                                    <label class="ml-2 block text-sm font-medium text-gray-900 dark:text-gray-300"
                                        for="dosis_simple_radio">Dosis simple</label>
                                </div>
                                <div class="flex items-center">
                                    <input class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                                        id="dosis_especifica_radio" name="tipo_dosis" type="radio" value="especifica" />
                                    <label class="ml-2 block text-sm font-medium text-gray-900 dark:text-gray-300"
                                        for="dosis_especifica_radio">Dosis específica</label>
                                </div>
                            </div>
                            <div id="dosis_simple" class="flex items-center gap-2">
                                <label for="cantidad_simple"
                                    class="text-sm font-medium text-gray-700 dark:text-gray-300">Cantidad</label>
                                <input id="cantidad_simple" type="number" min="1"
                                    class="w-20 rounded-md border-gray-300 text-sm" placeholder="1" />

                                <span class="text-sm text-gray-700 dark:text-gray-300">cada</span>

                                <input id="intervalo_horas" type="number" min="1"
                                    class="w-20 rounded-md border-gray-300 text-sm" placeholder="8" />

                                <span class="text-sm text-gray-700 dark:text-gray-300">horas</span>
                            </div>
                            <div class="hidden" id="dosis_avanzada_lista">
                                <div class="space-y-4">
                                    <div class="grid grid-cols-[1fr_1fr_auto] items-end gap-4">
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                                for="cantidad_adv_1">Cantidad <span
                                                    class="text-red-500">*</span></label>
                                            <input
                                                class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                                id="cantidad_adv_1" type="number" />
                                        </div>
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                                for="hora_adv_1">Hora <span class="text-red-500">*</span></label>
                                            <input
                                                class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                                id="hora_adv_1" type="time" />
                                        </div>
                                        <button
                                            class="flex items-center justify-center h-10 w-10 bg-red-500/10 text-red-500 rounded-DEFAULT hover:bg-red-500/20 transition-colors">
                                            <span class="material-symbols-outlined text-xl">delete</span>
                                        </button>
                                    </div>
                                    <div class="grid grid-cols-[1fr_1fr_auto] items-end gap-4">
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                                for="cantidad_adv_2">Cantidad <span
                                                    class="text-red-500">*</span></label>
                                            <input
                                                class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                                id="cantidad_adv_2" type="number" />
                                        </div>
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                                for="hora_adv_2">Hora <span class="text-red-500">*</span></label>
                                            <input
                                                class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                                id="hora_adv_2" type="time" />
                                        </div>
                                        <button
                                            class="flex items-center justify-center h-10 w-10 bg-red-500/10 text-red-500 rounded-DEFAULT hover:bg-red-500/20 transition-colors">
                                            <span class="material-symbols-outlined text-xl">delete</span>
                                        </button>
                                    </div>
                                </div>
                                <button
                                    class="mt-4 flex items-center gap-2 text-sm font-medium text-primary hover:text-sky-600 dark:hover:text-sky-400">
                                    <span class="material-symbols-outlined text-xl">add_circle</span>
                                    <span>Agregar Dosis</span>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                                for="instrucciones">Instrucciones adicionales</label>
                            <textarea
                                class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-DEFAULT focus:ring-primary focus:border-primary"
                                id="instrucciones" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="lg:col-span-1">
                        <div class="bg-gray-50 dark:bg-gray-700/50 p-6 rounded-lg sticky top-6">
                            <h3 class="text-lg font-semibold mb-4 text-gray-900 dark:text-gray-100">Resumen de
                                Prescripción</h3>
                            <div class="space-y-3 text-sm">
                                <div class="flex justify-between">
                                    <span class="text-gray-500 dark:text-gray-400">MEDICAMENTO:</span>
                                    <span class="font-medium">- / - / -</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500 dark:text-gray-400">VÍA:</span>
                                    <span class="font-medium">-</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500 dark:text-gray-400">FRECUENCIA:</span>
                                    <span class="font-medium">Semanal</span>
                                </div>
                                <div class="pt-3 border-t border-gray-200 dark:border-gray-600"></div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 dark:text-gray-400">Días de dosificación:</span>
                                    <span
                                        class="font-semibold text-base bg-gray-200 dark:bg-gray-600 rounded-full px-3 py-1">0</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 dark:text-gray-400">Dosis por día:</span>
                                    <span
                                        class="font-semibold text-base bg-gray-200 dark:bg-gray-600 rounded-full px-3 py-1">1</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 dark:text-gray-400">Total de dosis:</span>
                                    <span
                                        class="font-semibold text-base bg-gray-200 dark:bg-gray-600 rounded-full px-3 py-1">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end p-6 border-t border-gray-200 dark:border-gray-700 space-x-4">
                <button
                    class="px-6 py-2 text-sm font-medium text-gray-700 bg-gray-100 border border-gray-300 rounded-DEFAULT hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 dark:hover:bg-gray-600">
                    Cancelar
                </button>
                <button
                    class="px-6 py-2 text-sm font-medium text-white bg-primary rounded-DEFAULT hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-gray-800">
                    Guardar
                </button>
            </div>
        </div>
    </div>
    <script>
        const radioDosisSimple = document.getElementById('dosis_simple_radio');
        const radioDosisEspecifica = document.getElementById('dosis_especifica_radio');
        const divDosisSimple = document.getElementById('dosis_simple');
        const divDosisAvanzada = document.getElementById('dosis_avanzada_lista');

        function actualizarTipoDosis() {
            if (radioDosisSimple.checked) {
                divDosisSimple.classList.remove('hidden');
                divDosisAvanzada.classList.add('hidden');
            } else if (radioDosisEspecifica.checked) {
                divDosisSimple.classList.add('hidden');
                divDosisAvanzada.classList.remove('hidden');
            }
        }

        // Escucha los cambios en ambos radios
        radioDosisSimple.addEventListener('change', actualizarTipoDosis);
        radioDosisEspecifica.addEventListener('change', actualizarTipoDosis);

        // Inicializa el estado al cargar la página
        actualizarTipoDosis();
    </script>

    <script>
        const radioIntervalo = document.getElementById('tipo_regimen_intervalo');
        const radioDias = document.getElementById('tipo_regimen_dias');
        const regimenIntervalo = document.getElementById('regimen_intervalo');
        const regimenDias = document.getElementById('regimen_dias_especificos');

        function actualizarRegimen() {
            if (radioIntervalo.checked) {
                regimenIntervalo.classList.remove('hidden');
                regimenDias.classList.add('hidden');
            } else if (radioDias.checked) {
                regimenIntervalo.classList.add('hidden');
                regimenDias.classList.remove('hidden');
            }
        }

        // Escucha cambios en ambos radio buttons
        radioIntervalo.addEventListener('change', actualizarRegimen);
        radioDias.addEventListener('change', actualizarRegimen);

        // Inicializa el estado al cargar la página
        actualizarRegimen();
    </script>
</body>

</html>
