<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Crear Estudio Clínico - Extensión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "4px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-size: 20px;
      }
      input, select, textarea {
        font-size: 14px !important;
      }
      label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
        display: block;
      }
    </style>
</head>

<body class="bg-slate-100 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4">
    <div
        class="bg-white dark:bg-background-dark w-full max-w-6xl rounded-lg shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
            <h1 class="text-xl font-medium text-slate-800 dark:text-slate-100">Crear estudio clínico</h1>
            <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="flex flex-col">
                    <label class="text-slate-700 dark:text-slate-300">Estudio de extensión</label>
                    <div class="flex items-center h-[38px]">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input checked="" class="sr-only peer" type="checkbox" />
                            <div
                                class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary">
                            </div>
                            <span class="ms-3 text-sm font-medium text-slate-600 dark:text-slate-400">Activado</span>
                        </label>
                    </div>
                </div>
                <div class="md:col-span-3">
                    <label class="text-slate-700 dark:text-slate-300">Estudio Base*</label>
                    <div class="relative">
                        <input
                            class="w-full h-[38px] px-3 pr-10 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all"
                            placeholder="Buscar estudio base..." type="text" />
                        <span class="absolute inset-y-0 right-3 flex items-center text-slate-400 pointer-events-none">
                            <span class="material-symbols-outlined">search</span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Nombre*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="1378-0020" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Título abreviado*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="EASi-HF mas de 40%" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Investigador principal*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="Atalah Antonio Rizcala Muvdi" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Coordinador principal*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="Ledys Maria Peña Cantillo" />
                </div>
                <div class="md:col-span-4">
                    <label class="text-slate-700 dark:text-slate-300">Título*</label>
                    <textarea
                        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary resize-none"
                        rows="2">EASi-HF: Estudio de fase III, aleatorizado, doble ciego, con grupos paralelos y de superioridad para evaluar la eficacia y la seguridad del uso combinado de BI 690517 y empagliflozina por vía oral en comparación con placebo y empagliflozina en participantes con insuficiencia cardíaca sintomática (clasificación...</textarea>
                </div>
                <div class="md:col-span-4">
                    <label class="text-slate-700 dark:text-slate-300">Patología*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="ENFERMEDAD CARDIOVASCULAR, NO ESPECIFICADA" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Patrocinador*</label>
                    <div class="flex gap-1">
                        <select
                            class="flex-1 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Boehringer</option>
                        </select>
                        <button
                            class="bg-primary text-white w-[38px] h-[38px] flex items-center justify-center rounded">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">CRO</label>
                    <div class="flex gap-1">
                        <select
                            class="flex-1 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Iqvia Rds Colombia</option>
                        </select>
                        <button
                            class="bg-primary text-white w-[38px] h-[38px] flex items-center justify-center rounded">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">#sitio*</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" value="1170001" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Duración del estudio*</label>
                    <div class="flex gap-2">
                        <input
                            class="w-1/3 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                            type="text" value="5" />
                        <select
                            class="w-2/3 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Años</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Comité de ética*</label>
                    <div class="flex gap-1">
                        <select
                            class="flex-1 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Comité De Ética En Investi...</option>
                        </select>
                        <button
                            class="bg-primary text-white w-[38px] h-[38px] flex items-center justify-center rounded">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Centro de investigación*</label>
                    <div class="flex gap-1">
                        <select
                            class="flex-1 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Cimedical Sas</option>
                        </select>
                        <button
                            class="bg-primary text-white w-[38px] h-[38px] flex items-center justify-center rounded">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Estado*</label>
                    <select
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                        <option>Inicio</option>
                    </select>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Duración de reclutamiento</label>
                    <div class="flex gap-2">
                        <input
                            class="w-1/3 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                            type="text" />
                        <select
                            class="w-2/3 h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option>Seleccione una op</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Código INVIMA</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Fase del estudio</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Especialidad</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 italic placeholder:italic focus:ring-1 focus:ring-primary focus:border-primary"
                        placeholder="buscar..." type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Grupo etario</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Número de acta</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Fecha visita de inicio</label>
                    <div class="relative">
                        <input
                            class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                            placeholder="dd/mm/aaaa" type="text" />
                        <span class="absolute right-3 top-2 text-slate-400">
                            <span class="material-symbols-outlined">calendar_today</span>
                        </span>
                    </div>
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Meta</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
                <div>
                    <label class="text-slate-700 dark:text-slate-300">Meta adicional</label>
                    <input
                        class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary"
                        type="text" />
                </div>
            </div>
            <div class="pt-4 border-t border-slate-100 dark:border-slate-800">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Información adicional de
                    estudio de extensión</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-slate-700 dark:text-slate-300">Visita inicio en estudio base</label>
                        <select
                            class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option value="">Seleccione visita...</option>
                            <option>Visita 1 - Screening</option>
                            <option>Visita 2 - Randomization</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-slate-700 dark:text-slate-300">Visitas asociadas del estudio base</label>
                        <div class="relative">
                            <div
                                class="min-h-[38px] p-1.5 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded flex flex-wrap gap-1 items-center">
                                <span
                                    class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs px-2 py-0.5 rounded flex items-center gap-1">
                                    V1
                                    <button class="material-symbols-outlined !text-[14px]">close</button>
                                </span>
                                <span
                                    class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs px-2 py-0.5 rounded flex items-center gap-1">
                                    V2
                                    <button class="material-symbols-outlined !text-[14px]">close</button>
                                </span>
                                <input class="border-none focus:ring-0 p-0 text-sm ml-1 bg-transparent w-20"
                                    placeholder="..." type="text" />
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="text-slate-700 dark:text-slate-300">Visita mínima para ingresar a
                            extensión</label>
                        <select
                            class="w-full h-[38px] px-3 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary">
                            <option value="">Seleccione visita mínima...</option>
                            <option>Semana 52</option>
                            <option>Fin de tratamiento</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div
            class="px-6 py-4 flex justify-end gap-3 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
            <button
                class="px-8 py-2 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-medium text-sm">
                Cancelar
            </button>
            <button
                class="px-8 py-2 bg-primary text-white rounded-full hover:bg-blue-600 transition-colors font-medium text-sm shadow-sm">
                Guardar
            </button>
        </div>
    </div>

</body>

</html>
